name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: devops-flask-postgres
  IMAGE_TAG: 3.0.0

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir Imagen
        run: |
          # COMENTARIO: Convertimos "Ajvera2000" a "ajvera2000" en minúsculas para evitar el error de Docker
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          docker build \
          -t ghcr.io/${REPO_LOWER}:${{ env.IMAGE_TAG }} \
          -t ghcr.io/${REPO_LOWER}:latest \
          .

      - name: Publicar Imagen
        run: |
          # COMENTARIO: Usamos la misma variable corregida en minúsculas para subir el contenido con éxito
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          docker push ghcr.io/${REPO_LOWER}:${{ env.IMAGE_TAG }}
          docker push ghcr.io/${REPO_LOWER}:latest